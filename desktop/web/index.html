<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symphony Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <h1>Symphony Desktop</h1>
            <p>Start, stop, and monitor the local Symphony service.</p>
          </div>
        </div>
        <div class="status-pill" id="serviceStatus">Unknown</div>
      </header>

      <section class="controls">
        <label>
          Workflow Path
          <input id="workflowPath" type="text" spellcheck="false" />
        </label>
        <label>
          Port
          <input id="servicePort" type="number" min="1" max="65535" />
        </label>
        <div class="buttons">
          <button id="startButton" class="primary" type="button">Start Service</button>
          <button id="stopButton" type="button">Stop Service</button>
          <button id="refreshButton" type="button">Refresh Status</button>
          <button id="openBrowserButton" type="button">Open In Browser</button>
        </div>
      </section>

      <section class="meta">
        <p id="statusLine">Waiting for desktop runtime status.</p>
        <p id="errorLine" class="error hidden"></p>
      </section>

      <main class="frame-wrap">
        <iframe id="dashboardFrame" title="Symphony Dashboard"></iframe>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
